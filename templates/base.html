<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicación FastAPI para mostrar rutas desde MongoDB">
    <meta name="author" content="Patricio Araneda">
    <link rel=""preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', path='css/main.css') }}">
        <title>
        {% if title %}
        {{ title }}
        {% else %}
        Home
        {% endif %}
    </title>
    <meta name="keywords" content="FastAPI, MongoDB, Rutas, Web App">
    <meta name="theme-color" content="#527c9f">

</head>

<body>
    <header class="bg-primary text-white text-center fixed-top">
        <!-- <h1 class="h2 m-0">Rutas App</h1> -->
        <nav class="navbar navbar-expand-md navbar-dark bg-steel " data-bs-theme="dark">
            <div class="container">
                <a class="navbar-brand" href="/">MongoDb</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="navbar-nav me-auto">
                        <a class="nav-link active" href="{{ url_for('home') }}">Home</a>
                        <a class="nav-link" href="{{ url_for('rutas') }}">Rutas</a>
                    </div>
                    <!-- navbar right side -->
                    
                </div>
            </div>
        </nav>
    </header>
    <div class="container mt-5 mb-5 py-4">
        {% block content %}
        {% endblock content %}
    </div>

  <footer class="mt-auto py-3 bg-body-tertiary border-top fixed-bottom">
    <div class="container text-center">
        <span class="text-muted">© <span id="year"></span> Patricio Araneda. All rights reserved.</span>
    </div>
  </footer>
  <script>
    <!-- Set the current year in the footer -->
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous">
    </script>
</body>

</html>
