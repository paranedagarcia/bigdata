{% extends "base.html" %}
{% block content %}

    <img src="{{ url_for('static', path='images/error.png') }}" alt="Error Image" class="mb-4" style="max-width: 200px;">
    <h1>Oops... {{ status_code }} Error</h1>
    <p>{{ error_message }}</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary">Go Back Home</a>
</div>
{% endblock content %}
